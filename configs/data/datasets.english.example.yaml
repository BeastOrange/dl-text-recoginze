datasets:
  - name: mjsynth
    relative_path: data/raw/mjsynth
    required: false
    manifest_format: mjsynth
    image_extensions: [".jpg", ".jpeg", ".png"]
    label_extensions: []
  - name: iiit5k
    relative_path: data/raw/iiit5k
    required: false
    manifest_format: iiit5k_mat
    annotation_path: data/raw/iiit5k/testdata.mat
    image_extensions: [".jpg", ".jpeg", ".png"]
    label_extensions: []
  - name: svt
    relative_path: data/raw/svt
    required: false
    manifest_format: svt_xml
    annotation_path: data/raw/svt/train.xml
    image_extensions: [".jpg", ".jpeg", ".png"]
    label_extensions: []
  - name: icdar13
    relative_path: data/raw/icdar13
    required: false
    manifest_format: icdar_gt
    annotation_path: data/raw/icdar13/Challenge2_Test_Task3_GT.txt
    image_extensions: [".jpg", ".jpeg", ".png"]
    label_extensions: []
  - name: icdar15
    relative_path: data/raw/icdar15
    required: false
    manifest_format: icdar_gt
    annotation_path: data/raw/icdar15/Challenge4_Test_Task3_GT.txt
