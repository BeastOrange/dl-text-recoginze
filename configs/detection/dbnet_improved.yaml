experiment_name: det_dbnet_hardcase_v1
model_name: dbnet
dataset_dir: data/raw/rects
train_manifest: data/processed/detection_splits/train.jsonl
validation_manifest: data/processed/detection_splits/val.jsonl
output_root: artifacts/detection/det_dbnet_hardcase_v1
train_split: train
val_split: val
image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp
epochs: 140
batch_size: 12
learning_rate: 0.0008
image_height: 256
image_width: 256
device: auto
num_workers: 0
seed: 2026
hard_case_sampling: true
multi_scale_augmentation: true
description: >
  Improved DBNet-style tiny config with hard-case sampling and multi-scale augmentation flags.
  Use this after detection manifests are prepared from ReCTS and ShopSign.
