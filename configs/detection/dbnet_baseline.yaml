experiment_name: det_dbnet_baseline
model_name: dbnet
dataset_dir: data/raw/rects
train_manifest: data/processed/detection_splits/train.jsonl
validation_manifest: data/processed/detection_splits/val.jsonl
output_root: artifacts/detection/det_dbnet_baseline
train_split: train
val_split: val
image_extensions:
  - .jpg
  - .jpeg
  - .png
epochs: 10
batch_size: 8
learning_rate: 0.001
image_height: 256
image_width: 256
device: auto
num_workers: 0
seed: 42
hard_case_sampling: false
multi_scale_augmentation: false
description: >
  DBNet-style tiny baseline config for Chinese scene text detection.
  This config uses prepared detection manifests and runs a minimal trainable baseline.
