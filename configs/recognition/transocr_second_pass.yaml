experiment_name: transocr_refine_cn_scene
model_name: transocr
dataset_manifest: data/processed/recognition_splits/train.jsonl
charset_file: data/processed/charset_zh_mixed.txt
output_dir: artifacts/checkpoints/recognition/transocr_refine
epochs: 100
batch_size: 128
image_height: 48
image_width: 320
learning_rate: 0.0007
second_pass:
  enabled: true
  confidence_threshold: 0.80
  max_blur_score: 0.42
  min_contrast_score: 0.38
  min_text_length: 2
  min_aspect_ratio: 0.25
  max_aspect_ratio: 18.0
