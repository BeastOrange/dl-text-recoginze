experiment_name: transformer_detector_crop_quick
model_name: transformer
dataset_manifest: data/processed/recognition_crop_splits/train.jsonl
validation_manifest: data/processed/recognition_crop_splits/val.jsonl
charset_file: data/processed/recognition_crop_charset_zh_mixed.txt
output_dir: artifacts/checkpoints/recognition/transformer_detector_crop_quick
epochs: 2
batch_size: 32
image_height: 48
image_width: 320
learning_rate: 0.0007
device: auto
num_workers: 0
preprocess:
  preserve_aspect_ratio: true
  rotate_vertical_text: true
  vertical_aspect_threshold: 1.2
  padding_value: 255
second_pass:
  enabled: true
  confidence_threshold: 0.78
  max_blur_score: 0.45
  min_contrast_score: 0.35
  min_text_length: 2
  min_aspect_ratio: 0.2
  max_aspect_ratio: 20.0
